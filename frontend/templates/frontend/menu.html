
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .sidebar {
            width: 250px;
            transition: width 0.3s;
        }
        .sidebar.collapsed {
            width: 80px;
        }
        .sidebar .nav-link span {
            transition: opacity 0.3s;
        }
        .sidebar.collapsed .nav-link span {
            opacity: 0;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
        }
        .toggle-btn {
            cursor: pointer;
        }
        .logout {
            position: absolute;
            bottom: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="d-flex flex-column bg-light sidebar position-relative" id="sidebar">
        <div class="p-3">
            <span class="fs-4">Mi Aplicación</span>
            <i class="bi bi-list float-end toggle-btn" onclick="toggleSidebar()"></i>
        </div>
        <ul class="nav flex-column px-2">
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center" href="{% url 'home' %}">
                    <i class="bi bi-house-door me-2"></i><span>Home</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center" href="{% url 'reports' %}">
                    <i class="bi bi-bar-chart-line me-2"></i><span>Reports</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center" href="{% url 'about' %}">
                    <i class="bi bi-info-circle me-2"></i><span>About</span>
                </a>
            </li>
        </ul>
        <div class="logout px-2">
            <a class="nav-link d-flex align-items-center text-danger" href="{% url 'logout' %}">
                <i class="bi bi-box-arrow-right me-2"></i><span>Cerrar sesión</span>
            </a>
        </div>
    </div>
    <div class="content">
        <h1>Bienvenido al Menú Principal</h1>
        <p>Selecciona una opción del menú para continuar.</p>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }
    </script>
</body>
</html>
