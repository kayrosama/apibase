{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>KayroSama</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      overflow-x: hidden;
    }
    .sidebar {
      height: 100vh;
      width: 250px;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #0d6efd;
      padding-top: 60px;
      transition: width 0.3s;
    }
    .sidebar.collapsed {
      width: 80px;
    }
    .sidebar .nav-link {
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;
    }
    .sidebar .nav-link i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }
    .sidebar.collapsed .nav-link span {
      display: none;
    }
    .content {
      margin-left: 250px;
      padding: 20px;
      transition: margin-left 0.3s;
    }
    .content.collapsed {
      margin-left: 80px;
    }
    .toggle-btn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1001;
    }
  </style>
</head>
<body>
  <button class="btn btn-light toggle-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>

  <div class="sidebar bg-primary" id="sidebar">
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link active" href="/home/"><i class="fas fa-home"></i><span>Home</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/reports/"><i class="fas fa-chart-line"></i><span>Reports</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/about/"><i class="fas fa-info-circle"></i><span>About</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/logout/"><i class="fas fa-info-circle"></i><span>Logout</span></a>
      </li>
    </ul>
  </div>

  <div class="content" id="mainContent">
    <h1>Bienvenido al Home Principal</h1>
    <p>Selecciona una opción del menú para continuar.</p>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('mainContent').classList.toggle('collapsed');
    }
  </script>
</body>
</html>
